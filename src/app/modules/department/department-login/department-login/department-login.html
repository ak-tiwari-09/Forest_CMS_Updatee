<!-- <app-navbar></app-navbar> -->

<div class="login-wrap">

  <!-- LEFT PANEL -->
  <div class="ll">
    <div class="ll-illo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
      </svg>
    </div>

    <h2>Department Login</h2>
    <p>
      Manage complaints, verify requests and provide timely resolutions
    </p>

    <div class="fpills">

      <div class="fp">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        <span>Complaint management</span>
      </div>

      <div class="fp">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2" />
        </svg>
        <span>Department notifications</span>
      </div>

      <div class="fp">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" />
        </svg>
        <span>Secure department access</span>
      </div>

    </div>
  </div>


  <!-- RIGHT PANEL -->
  <div class="lr">

    <div class="lr-logo">

      <div class="lb">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        </svg>
        <br>
      </div>

      <h2>Department Login</h2>

    </div>


    <form class="lform" 
          (ngSubmit)="onLoginDepartment()" 
          #loginForm="ngForm">


      <div class="lff">
        <label>Mobile No</label>

        <input 
          type="text"
          placeholder="Enter Mobile no"
          name="username"
          [(ngModel)]="username"
          required
          #usernameRef="ngModel">
      </div>


      <div class="lff">
        <label>Password</label>

        <input 
          type="password"
          placeholder="Enter your password"
          name="password"
          [(ngModel)]="password"
          required
          #passwordRef="ngModel">
      </div>


      <div class="lrow">

        <label class="lchk">
          <input type="checkbox">
          Remember me
        </label>

        <span class="lfgt">
          Forgot password?
        </span>

      </div>


      <!-- Validation -->
      <div 
        *ngIf="(usernameRef.invalid && usernameRef.touched) || 
               (passwordRef.invalid && passwordRef.touched)"
        style="color:red; margin-bottom:10px;">
        Please enter username and password
      </div>


      <!-- API Error -->
      <div 
        *ngIf="errorMsg"
        style="color:red; margin-bottom:10px;">
        {{ errorMsg }}
      </div>


      <button 
        type="submit"
        class="btn-login"
        [disabled]="loginForm.invalid || loading">

        {{ loading ? 'Signing in...' : 'Sign in' }}

      </button>


      <div class="ldiv">
        <span>or</span>
      </div>


      <div class="nav-btn-group">

        <button 
          type="button"
          class="nav-btn"
          (click)="goToHome()">
          Home
        </button>




        <button 
          type="button"
          class="nav-btn"
          (click)="goToUserLogin()">
          User Login
        </button>

      </div>


    </form>

  </div>

</div>
