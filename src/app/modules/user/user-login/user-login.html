    <form class="lform" (ngSubmit)="onLoginUser()" #loginForm="ngForm">

      <div class="lff">
        <label>Mobile number</label>
        <input type="text" placeholder="Enter mobile" name="username" [(ngModel)]="username" required
          #usernameRef="ngModel">
      </div>

      <div class="lff">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" name="password" [(ngModel)]="password" required
          #passwordRef="ngModel">
      </div>

      <div class="lrow">
        <label class="lchk">
          <input type="checkbox"> Remember me
        </label>
        <span class="lfgt">Forgot password?</span>
      </div>

      <!-- ✅ Validation Message -->
      <div ngIf="(usernameRef.invalid && usernameRef.touched) || (passwordRef.invalid && passwordRef.touched)"
        style="color:red; margin-bottom:10px;">
        Please enter username and password
      </div>

      <!-- ✅ API Error -->
      <div ngIf="errorMsg" style="color:red; margin-bottom:10px;">
        {{ errorMsg }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || loading">

        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

      <div class="ldiv"><span>or</span></div>

      <!-- <button class="nav-btn" (click)="goToAdd()" >New complaint</button> -->

      <div class="nav-btn-group">
        <button class="nav-btn" (click)="goToHome()">Home</button>
        <button class="nav-btn" (click)="goToAdminLogin()">Admin Login</button>
      </div>

    </form>
