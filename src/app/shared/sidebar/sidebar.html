<div class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sb-brand">
    <button class="toggle-btn" (click)="toggleSidebar()">
      <svg viewBox="0 0 24 24">
        <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z" />
      </svg>
    </button>
    <div class="sb-brand-text">
      <div class="sb-title">Forest Complaint<br>Management</div>
      <div class="sb-sub">Smart Public System</div>
    </div>
  </div>

  <div class="sb-nav">
    <div class="sb-item"
         routerLink="/admin/dashboard"
         routerLinkActive="active">
      <svg viewBox="0 0 24 24">
        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
      </svg>
      <span class="sb-label">Dashboard</span>
    </div>

    <div class="sb-item"
         routerLink="/admin/all-complaint"
         routerLinkActive="active">
      <svg viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
      </svg>
      <span class="sb-label">Complaints</span>
    </div>

    <!-- NOTE: this icon path is duplicated from Complaints above — swap for a real "user" icon -->
    <div class="sb-item"
         routerLink="/admin/all-user"
         routerLinkActive="active">
      <svg viewBox="0 0 24 24">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
      </svg>
      <span class="sb-label">User</span>
    </div>

    <!-- NOTE: this icon path is also duplicated from Complaints — swap for a real "department/building" icon -->
    <div class="sb-item"
         routerLink="/admin/all-department"
         routerLinkActive="active">
      <svg viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
      </svg>
      <span class="sb-label">Department</span>
    </div>
  </div>

  <div class="sb-footer">
    <button class="logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
      </svg>
      <span class="sb-label">Logout</span>
    </button>
  </div>
</div>
